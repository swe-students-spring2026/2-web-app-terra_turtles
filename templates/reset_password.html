{% extends "base.html" %}

{% block title %}Reset Password · FitFlow{% endblock %}

{% block content %}
<section class="page-head">
  <div class="page-head__left">
    <h1 class="page-title">Reset Password</h1>
    <p class="page-subtitle">Set a new password for {{ email }}.</p>
  </div>
</section>

<section class="card">
  {% if error %}
    <div class="form-message">{{ error }}</div>
  {% endif %}

  <form class="form" method="POST" action="/reset-password/{{ token }}" autocomplete="off">
    <label class="label" for="password">New password</label>
    <input class="input" id="password" name="password" type="password" placeholder="At least 6 characters" required />

    <label class="label" for="confirm">Confirm new password</label>
    <input class="input" id="confirm" name="confirm" type="password" placeholder="Re-enter password" required />

    <div class="form-actions">
      <a class="btn btn--ghost" href="/login">Cancel</a>
      <button class="btn btn--primary" type="submit">Reset password</button>
    </div>
  </form>
</section>
{% endblock %}

{% block scripts %}{% endblock %}
