{% extends "base.html" %}
{% block title %}Profile · FitFlow{% endblock %}

{% block content %}
<section class="page-head">
  <div class="page-head__left">
    <h1 class="page-title">Profile</h1>
    <p class="page-subtitle">Set your age and sex for health calculations.</p>
  </div>
</section>

<section class="card">
  {% if error %}
  <p style="color:#b02a2a; font-size:13px; margin-bottom:8px;">{{ error }}</p>
  {% endif %}

  <form class="form" method="POST" action="/profile" autocomplete="off">
    <label class="label" for="age">Age</label>
    <input class="input" id="age" name="age" type="number" min="1" max="120"
           value="{{ user.age or '' }}" placeholder="e.g., 25" required />

    <label class="label" for="sex">Biological Sex</label>
    <select class="input" id="sex" name="sex" required>
      <option value="" disabled {% if not user.sex %}selected{% endif %}>Select…</option>
      <option value="male"   {% if user.sex == 'male'   %}selected{% endif %}>Male</option>
      <option value="female" {% if user.sex == 'female' %}selected{% endif %}>Female</option>
    </select>

    <p style="font-size:12px; color:var(--muted); margin:0;">
      Used for BMR, Ideal Body Weight, and Body Fat % estimates on the Weights page.
    </p>

    <div class="form-actions">
      <a class="btn btn--ghost" href="/weights">Cancel</a>
      <button class="btn btn--primary" type="submit">Save</button>
    </div>
  </form>
</section>
{% endblock %}
