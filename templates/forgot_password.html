{% extends "base.html" %}

{% block title %}Forgot Password · FitFlow{% endblock %}

{% block content %}
<section class="page-head">
  <div class="page-head__left">
    <h1 class="page-title">Forgot Password</h1>
    <p class="page-subtitle">Enter your email to reset your password.</p>
  </div>
</section>

<section class="card">
  {% if error %}
    <div class="form-message">{{ error }}</div>
  {% endif %}

  <form class="form" method="POST" action="/forgot-password" autocomplete="off">
    <label class="label" for="email">Email</label>
    <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required />

    <div class="form-actions">
      <a class="btn btn--ghost" href="/login">Back to login</a>
      <button class="btn btn--primary" type="submit">Find account</button>
    </div>
  </form>
</section>
{% endblock %}

{% block scripts %}{% endblock %}
